<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>[TITULO_DA_PAGINA]</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background: #000000;
            min-height: 100vh;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(255, 144, 77, 0.15);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(255, 144, 77, 0.25);
        }

        .primary-color {
            color: #FF904D;
        }

        .primary-bg {
            background: #FF904D;
        }

        .icon-container {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 144, 77, 0.15);
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes scroll-bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(10px);
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -200% center;
            }

            100% {
                background-position: 200% center;
            }
        }

        /* === BARRA DE PROGRESSO DE LEITURA === */
        #reading-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #FF904D, #ff9f7d, #FF904D);
            background-size: 200% 100%;
            animation: shimmer 2s linear infinite;
            z-index: 9999;
            transition: width 0.1s linear;
            box-shadow: 0 0 10px rgba(255, 144, 77, 0.4);
        }

        /* === BOTÃO PRÓXIMO CARD === */
        #next-card {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 144, 77, 0.9);
            color: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            z-index: 9998;
            box-shadow: 0 4px 20px rgba(255, 144, 77, 0.3);
            border: none;
        }

        #next-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        #next-card:hover {
            transform: translateY(-3px) scale(1.1);
            box-shadow: 0 8px 30px rgba(255, 144, 77, 0.5);
        }

        /* @MIRA:RESPONSIVE:START */
        /* ============================================================
           MIRA — camada de reflow mobile-first (fonte: templates/themes/responsive.css).
           TODO slide 16:9 do Mira fica legível no celular em retrato SEM
           arquivo mobile separado: o mesmo deck se reorganiza — fontes
           encolhem, grids empilham, padding reduz, palcos escalam.
           Se editar, edite também templates/themes/responsive.css.
           ============================================================ */
        html, body { max-width: 100%; overflow-x: hidden; }
        img, svg, video, canvas, iframe, table, pre { max-width: 100%; }

        @media (max-width: 640px) {
          .text-9xl { font-size: clamp(3rem, 12vw, 5rem)      !important; line-height: 1.05 !important; }
          .text-8xl { font-size: clamp(2.75rem, 11vw, 4.5rem) !important; line-height: 1.06 !important; }
          .text-7xl { font-size: clamp(2.25rem, 10vw, 3.75rem)!important; line-height: 1.08 !important; }
          .text-6xl { font-size: clamp(2rem, 9vw, 3rem)       !important; line-height: 1.1  !important; }
          .text-5xl { font-size: clamp(1.75rem, 8vw, 2.5rem)  !important; line-height: 1.12 !important; }
          .text-4xl { font-size: clamp(1.5rem, 7vw, 2rem)     !important; line-height: 1.15 !important; }
          .text-3xl { font-size: clamp(1.35rem, 6vw, 1.75rem) !important; line-height: 1.2  !important; }
          .text-2xl { font-size: clamp(1.2rem, 5vw, 1.5rem)   !important; line-height: 1.25 !important; }
          .text-xl  { font-size: clamp(1.05rem, 4.5vw, 1.25rem)!important; line-height: 1.3 !important; }

          h1, h2, h3 { overflow-wrap: break-word; }

          .p-12 { padding: 1.25rem !important; }
          .p-10 { padding: 1.15rem !important; }
          .p-8  { padding: 1.05rem !important; }
          .px-12, .px-10 { padding-left: 1.15rem !important; padding-right: 1.15rem !important; }
          .px-8 { padding-left: 1rem !important; padding-right: 1rem !important; }
          .py-16 { padding-top: 2.5rem !important; padding-bottom: 2.5rem !important; }
          .gap-8 { gap: 1rem !important; }
          .gap-10, .gap-12 { gap: 1.25rem !important; }

          .min-h-screen {
            min-height: 100dvh !important;
            height: auto !important;
            padding-top: 2rem !important;
            padding-bottom: 2rem !important;
          }
          .min-h-screen.justify-center,
          .min-h-screen.items-center { justify-content: flex-start !important; }

          .grid-cols-2, .grid-cols-3, .grid-cols-4 { grid-template-columns: 1fr !important; }

          .anim-stage {
            max-width: 100% !important;
            height: auto !important;
            aspect-ratio: 16 / 9;
            min-height: 0 !important;
          }

          table { font-size: 0.82rem !important; }
          .overflow-x-auto { -webkit-overflow-scrolling: touch; }

          #mira-next, #next-card {
            bottom: max(1rem, env(safe-area-inset-bottom)) !important;
            right: max(1rem, env(safe-area-inset-right)) !important;
            width: 44px !important; height: 44px !important;
          }
        }
        /* @MIRA:RESPONSIVE:END */
    </style>
</head>

<body class="font-sans">

    <!-- Barra de Progresso de Leitura -->
    <div id="reading-progress" style="width: 0%;"></div>

    <!-- Botão Próximo Card (flutuante) -->
    <button id="next-card" aria-label="Próximo card">
        <i data-lucide="chevron-down" class="w-6 h-6" id="next-card-icon"></i>
    </button>

    <script>
        AOS.init({ duration: 800, once: true, offset: 100 });
        lucide.createIcons();

        // === Navegação Card-a-Card ===
        const cardSections = [];

        function buildCardSections() {
            cardSections.length = 0;
            const wrappers = document.querySelectorAll('.fullscreen-wrapper');
            if (wrappers.length > 0) {
                wrappers.forEach(el => cardSections.push(el));
            } else {
                document.querySelectorAll('main > .glass-card, main > div:not(.glass-card)').forEach(el => cardSections.push(el));
            }
        }

        function getCurrentSectionIndex() {
            const scrollTop = window.scrollY + window.innerHeight * 0.3;
            let idx = -1;
            for (let i = 0; i < cardSections.length; i++) {
                if (cardSections[i].offsetTop <= scrollTop) {
                    idx = i;
                }
            }
            return idx;
        }

        // === Scroll: Progresso + Visibilidade do Botão ===
        window.addEventListener('scroll', () => {
            const scrollTop = window.scrollY;
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const progress = (scrollTop / docHeight) * 100;
            document.getElementById('reading-progress').style.width = progress + '%';

            const btn = document.getElementById('next-card');
            if (scrollTop > 300) {
                btn.classList.add('visible');
            } else {
                btn.classList.remove('visible');
            }

            const icon = document.getElementById('next-card-icon');
            const atBottom = (scrollTop + window.innerHeight) >= (document.documentElement.scrollHeight - 100);
            if (atBottom) {
                icon.setAttribute('data-lucide', 'chevron-up');
            } else {
                icon.setAttribute('data-lucide', 'chevron-down');
            }
            lucide.createIcons();
        });

        // === Clique: Próximo Card ===
        document.getElementById('next-card').addEventListener('click', () => {
            const atBottom = (window.scrollY + window.innerHeight) >= (document.documentElement.scrollHeight - 100);
            if (atBottom) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
                return;
            }

            const idx = getCurrentSectionIndex();
            const nextIdx = idx + 1;
            if (nextIdx < cardSections.length) {
                cardSections[nextIdx].scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        });

        // === Animações: Contadores e Barras de Progresso ===
        function animateCounters() {
            const counters = document.querySelectorAll('.counter');
            counters.forEach(counter => {
                const target = parseInt(counter.getAttribute('data-target'));
                const duration = 2000;
                const increment = target / (duration / 16);
                let current = 0;
                const updateCounter = () => {
                    current += increment;
                    if (current < target) {
                        counter.textContent = Math.ceil(current) + '%';
                        requestAnimationFrame(updateCounter);
                    } else { counter.textContent = target + '%'; }
                };
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => { if (entry.isIntersecting) { updateCounter(); observer.unobserve(entry.target); } });
                });
                observer.observe(counter);
            });
        }

        function animateProgressBars() {
            document.querySelectorAll('.progress-bar-fill').forEach(bar => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            setTimeout(() => { bar.style.width = bar.getAttribute('data-width') + '%'; }, 200);
                            observer.unobserve(entry.target);
                        }
                    });
                });
                observer.observe(bar);
            });
        }

        // === Configuração de Modo Tela Cheia (Wrappers) ===
        function setupFullScreenWrappers() {
            const main = document.querySelector('main');
            if (!main) return;

            main.classList.remove('gap-[60vh]', 'py-20');
            main.style.paddingTop = '';

            const children = Array.from(main.children);
            children.forEach(child => {
                if (child.tagName === 'DIV' && !child.classList.contains('fullscreen-wrapper')) {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'min-h-screen w-full flex items-center justify-center fullscreen-wrapper snap-start p-4';
                    child.parentNode.insertBefore(wrapper, child);
                    wrapper.appendChild(child);
                }
            });

            buildCardSections();
        }

        // === Inicia ===
        document.addEventListener('DOMContentLoaded', () => {
            setupFullScreenWrappers();
            setTimeout(animateCounters, 500);
            setTimeout(animateProgressBars, 600);

            const headerBtn = document.getElementById('header-next-btn');
            if (headerBtn) {
                headerBtn.addEventListener('click', () => {
                    if (cardSections.length > 0) {
                        cardSections[0].scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                });
            }

            // === Navegação por Teclado ===
            document.addEventListener('keydown', (e) => {
                const idx = getCurrentSectionIndex();

                if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === 'PageDown') {
                    e.preventDefault();
                    const nextIdx = idx + 1;
                    if (nextIdx < cardSections.length) {
                        cardSections[nextIdx].scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp' || e.key === 'PageUp') {
                    e.preventDefault();
                    const prevIdx = idx - 1;
                    if (prevIdx >= 0) {
                        cardSections[prevIdx].scrollIntoView({ behavior: 'smooth', block: 'start' });
                    } else if (idx === 0 || idx === -1) {
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                }
            });

            window.addEventListener('resize', setupFullScreenWrappers);
        });
    </script>
</body>

</html>
