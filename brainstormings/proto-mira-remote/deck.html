<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Mira remote — protótipo</title>
<style>
  :root { --orange: #FF904D; --green: #35D07F; }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, system-ui, "Segoe UI", sans-serif;
    background: radial-gradient(120% 120% at 70% -10%, #1c2333 0%, #0b0e15 55%);
    color: #eef1f7; overflow: hidden; display: flex; flex-direction: column;
    height: 100dvh;
  }

  /* topo: status da sessão (sobreposto, fora do palco) */
  .status {
    position: fixed; top: 0; left: 0; right: 0; z-index: 2;
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 20px; font-size: 14px; color: #9aa4b8;
  }
  .pill { display: flex; align-items: center; gap: 8px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #556; }
  .dot.on { background: var(--green); box-shadow: 0 0 10px var(--green); }

  /* palco 16:9 fixo (1280x720) escalado para caber na tela.
     Espelho total: o slide tem a MESMA geometria em todo aparelho. */
  .stage {
    position: fixed; left: 50%; top: 50%; width: 1280px; height: 720px;
    transform: translate(-50%, -50%) scale(var(--s, 1));
    display: grid; place-items: center;
  }
  .card {
    width: 880px; border-radius: 24px; padding: 44px 48px;
    background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.09);
    backdrop-filter: blur(12px); box-shadow: 0 30px 80px rgba(0,0,0,.45);
    position: relative; overflow: hidden;
  }
  /* metáfora em loop contínuo (Regra Zero: sempre viva) */
  .halo {
    position: absolute; right: -60px; top: -60px; width: 240px; height: 240px;
    border-radius: 50%; background: radial-gradient(circle, var(--orange), transparent 70%);
    opacity: .25; animation: breathe 4s ease-in-out infinite;
  }
  @keyframes breathe { 0%,100% { transform: scale(1); opacity:.18 } 50% { transform: scale(1.25); opacity:.32 } }

  .kicker { color: var(--orange); font-weight: 700; letter-spacing: .12em; text-transform: uppercase; font-size: 13px; }
  h1 { font-size: 48px; line-height: 1.1; margin: 12px 0 8px; }
  ul { list-style: none; margin-top: 22px; display: grid; gap: 14px; }
  li {
    font-size: 22px; padding: 12px 16px; border-radius: 12px;
    background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.07);
    opacity: 0; transform: translateY(14px); transition: .45s cubic-bezier(.2,.7,.2,1);
  }
  li.show { opacity: 1; transform: none; }
  li.show::before { content: "▸ "; color: var(--orange); }

  /* barra de controle (sobreposta, fora do palco) */
  .bar {
    position: fixed; bottom: 26px; left: 0; right: 0; z-index: 2;
    display: flex; gap: 12px; justify-content: center; padding: 0 20px;
  }
  button {
    flex: 1; max-width: 200px; padding: 18px; border: 0; border-radius: 16px;
    font-size: 17px; font-weight: 700; color: #fff; cursor: pointer;
    background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12);
    transition: transform .1s, background .2s;
  }
  button:active { transform: scale(.95); }
  #next { background: var(--orange); border-color: transparent; color: #1a1206; }
  /* botões compactos do topo (tela cheia e desenho) */
  #fs, #pen {
    flex: none; max-width: none; padding: 6px 12px; font-size: 16px;
    border-radius: 10px; color: #9aa4b8;
  }
  .count {
    position: fixed; bottom: 6px; left: 0; right: 0; z-index: 2;
    text-align: center; color: #6b7488; font-size: 13px;
  }

  /* tela baixa (celular na horizontal): controles compactos, sem tampar o slide */
  @media (max-height: 500px) {
    .bar { bottom: 10px; }
    button { flex: none; padding: 8px 22px; font-size: 14px; }
    .count { display: none; }
  }
</style>

<div class="status">
  <div class="pill"><span class="dot" id="dot"></span><span id="conn">conectando…</span></div>
  <div class="pill">
    <span id="clients">—</span>
    <button id="pen" title="Desenhar (P)">✎</button>
    <button id="fs" title="Tela cheia">⛶</button>
  </div>
</div>

<div class="stage">
  <div class="card">
    <div class="halo"></div>
    <div class="kicker" id="kicker"></div>
    <h1 id="title"></h1>
    <ul id="bullets"></ul>
  </div>
</div>

<div class="bar">
  <button id="prev">◀ Voltar</button>
  <button id="next">Avançar ▶</button>
</div>
<div class="count" id="hint">Use as setas do teclado no PC · toque nos botões no celular</div>

<script>
// ── Conteúdo do deck (igual em todos os aparelhos) ─────────────────────────
const SLIDES = [
  { kicker: "Mira remote", title: "Espelhamento por rede local",
    bullets: ["O PC roda um servidor leve", "O celular abre a mesma URL", "Todos veem o mesmo slide"] },
  { kicker: "Bidirecional", title: "Mexeu num, move todos",
    bullets: ["Toque avançar no celular…", "…e a tela do PC avança junto", "Ninguém é dono — o servidor é o carteiro"] },
  { kicker: "Regra Zero", title: "A animação nunca para",
    bullets: ["O halo laranja respira em loop", "Sincronizamos o slide, não a animação", "Cada tela anima por conta"] },
  { kicker: "Fim", title: "Protótipo funcionando 🎉",
    bullets: ["Sem dependências", "Funciona offline na mesma Wi-Fi", "Serve pra hotspot do celular também"] },
];

// ── Estado local + renderização ────────────────────────────────────────────
let slide = 0, reveal = 0, applyingRemote = false;
const maxReveal = (i) => SLIDES[i].bullets.length;

function render() {
  const s = SLIDES[slide];
  document.getElementById('kicker').textContent = s.kicker;
  document.getElementById('title').textContent = s.title;
  const ul = document.getElementById('bullets');
  ul.innerHTML = '';
  s.bullets.forEach((b, i) => {
    const li = document.createElement('li');
    li.textContent = b;
    if (i < reveal) li.classList.add('show');
    ul.appendChild(li);
  });
  document.getElementById('hint').textContent =
    `Slide ${slide + 1}/${SLIDES.length}`;
}

// commit: aplica o estado e (se veio de ação local) publica pro servidor
function commit(next, { push }) {
  slide = Math.max(0, Math.min(SLIDES.length - 1, next.slide));
  reveal = Math.max(0, Math.min(maxReveal(slide), next.reveal));
  render();
  if (push) fetch('/state', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ slide, reveal }),
  });
}

function next() {
  if (reveal < maxReveal(slide)) commit({ slide, reveal: reveal + 1 }, { push: true });
  else if (slide < SLIDES.length - 1) commit({ slide: slide + 1, reveal: 0 }, { push: true });
}
function prev() {
  if (reveal > 0) commit({ slide, reveal: reveal - 1 }, { push: true });
  else if (slide > 0) commit({ slide: slide - 1, reveal: maxReveal(slide - 1) }, { push: true });
}

// ── Sincronização: recebe estado do servidor (não republica) ───────────────
const es = new EventSource('/events');
es.onopen = () => {
  document.getElementById('dot').classList.add('on');
  document.getElementById('conn').textContent = 'sincronizado';
};
es.onerror = () => {
  document.getElementById('dot').classList.remove('on');
  document.getElementById('conn').textContent = 'reconectando…';
};
es.onmessage = (ev) => {
  const st = JSON.parse(ev.data);
  document.getElementById('clients').textContent =
    `${st.clients} aparelho${st.clients === 1 ? '' : 's'}`;
  commit({ slide: st.slide, reveal: st.reveal }, { push: false });
  if (st.draw && window.applyRemoteDraw) window.applyRemoteDraw(st.draw);
};

// ── Escala do palco: 1280x720 encolhe/cresce para caber na tela ────────────
function fit() {
  const s = Math.min(innerWidth / 1280, innerHeight / 720);
  document.documentElement.style.setProperty('--s', s);
}
addEventListener('resize', fit);
fit();

// ── Tela cheia + paisagem (precisa de gesto do usuário) ────────────────────
const fsBtn = document.getElementById('fs');
if (!document.documentElement.requestFullscreen) fsBtn.style.display = 'none';
fsBtn.onclick = async () => {
  if (document.fullscreenElement) { document.exitFullscreen(); return; }
  await document.documentElement.requestFullscreen();
  // trava em paisagem quando o navegador deixa (Android); no iPhone só ignora
  try { await screen.orientation.lock('landscape'); } catch {}
};
document.addEventListener('fullscreenchange', () => {
  fsBtn.textContent = document.fullscreenElement ? '✕' : '⛶';
});

// ── Modo desenho: o botão dispara a mesma tecla "P" do mira-draw.js ────────
document.getElementById('pen').onclick = () =>
  document.dispatchEvent(new KeyboardEvent('keydown', { key: 'p' }));

// ── Entradas ───────────────────────────────────────────────────────────────
document.getElementById('next').onclick = next;
document.getElementById('prev').onclick = prev;
addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
});

render();
</script>
<script src="/mira-draw.js"></script>
<script>
// ── Sincroniza os traços do telestrator pelo mesmo canal ───────────────────
// Os traços viajam em coordenadas do PALCO (1280x720); cada aparelho converte
// de/para pixels da própria tela, então o desenho cai no mesmo lugar do slide.
(() => {
  const xf = () => {
    const s = Math.min(innerWidth / 1280, innerHeight / 720);
    return { s, ox: (innerWidth - 1280 * s) / 2, oy: (innerHeight - 720 * s) / 2 };
  };
  const conv = (sh, dir) => {
    const { s, ox, oy } = xf();
    const pt = dir === 'up'
      ? (x, y) => [(x - ox) / s, (y - oy) / s]   // tela -> palco
      : (x, y) => [x * s + ox, y * s + oy];      // palco -> tela
    const k = dir === 'up' ? 1 / s : s;
    const c = { ...sh };
    if (c.points) c.points = c.points.map(p => { const [x, y] = pt(p.x, p.y); return { x, y }; });
    if (c.x0 != null) { [c.x0, c.y0] = pt(sh.x0, sh.y0); [c.x1, c.y1] = pt(sh.x1, sh.y1); }
    if (c.x != null) [c.x, c.y] = pt(sh.x, sh.y);
    if (c.width != null) c.width = sh.width * k;
    if (c.size != null) c.size = sh.size * k;
    return c;
  };
  let lastDraw = []; // último estado em coordenadas do palco
  miraDraw.onchange = (shapes) => {
    lastDraw = shapes.map(s => conv(s, 'up'));
    fetch('/draw', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(lastDraw),
    });
  };
  window.applyRemoteDraw = (draw) => {
    lastDraw = draw;
    miraDraw.setShapes(draw.map(s => conv(s, 'down')));
  };
  // ao redimensionar/girar, reposiciona os traços no novo tamanho de tela
  addEventListener('resize', () => miraDraw.setShapes(lastDraw.map(s => conv(s, 'down'))));
})();
</script>
