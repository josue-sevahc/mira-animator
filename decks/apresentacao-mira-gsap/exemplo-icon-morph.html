<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo: /mira-icon-morph com 10 ícones — MIRA · GSAP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <!-- GSAP vendorado localmente: roda offline (file://) -->
    <script src="assets/gsap/gsap.min.js"></script>
    <script src="assets/gsap/MorphSVGPlugin.min.js"></script>
    <style>
        html, body { overflow-x: hidden; }
        body { background: #0a0a0a; color: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .glass-card { background: rgba(255,255,255,.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,.1); box-shadow: 0 10px 30px rgba(255,144,77,.15); }
        .primary-color { color: #FF904D; }
        .anim-stage { width: 100%; height: clamp(420px, 62vh, 600px); }
        .anim-stage svg { width: 100%; height: 100%; display: block; }
        @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
    </style>
</head>

<body>
    <main class="min-h-screen flex items-center justify-center px-6 py-10">
        <div class="w-full max-w-6xl">
            <!-- Título do slide: sem ícone, no máximo 6 palavras -->
            <div class="text-center mb-2">
                <h2 class="text-4xl md:text-5xl font-bold mb-2">Uma ideia <span class="primary-color italic">ganha o mundo</span></h2>
                <p class="text-white/60 italic text-lg md:text-xl">Dez formas, uma história: a ideia nasce, é vista, pensada, desenhada e decola.</p>
            </div>
            <div class="glass-card rounded-2xl p-2 md:p-3">
                <p id="rotulo" class="text-center text-white/45 text-sm tracking-[3px] uppercase mb-1">semente</p>
                <!-- @MIRA:SIZE 3/10 -->
                <div class="anim-stage" id="morph-stage">
                    <svg id="morph-svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid meet"></svg>
                </div>
            </div>
            <p class="text-center text-white/30 text-xs mt-4">Gerado pelo fluxo /mira-icon-morph: 10 ícones MDI (Iconify, Apache-2.0) morfando em loop. Abre por file://.</p>
        </div>
    </main>

    <script>
        gsap.registerPlugin(MorphSVGPlugin);
        const REDUCE = matchMedia('(prefers-reduced-motion: reduce)').matches;
        const MIRA_SIZE = 3;                  // 1..10, ponto único de ritmo/amplitude
        const SPEED = 0.7 + MIRA_SIZE * 0.1;  // 1.0 em SIZE 3

        // os 10 conceitos, na ordem do morph: cada item é o nome + o d do ícone (MDI, inline, viewBox 0 0 24 24)
        const HISTORIA = [
            { nome: 'semente',     d: "M2 22v-2s5-2 10-2s10 2 10 2v2zm9.3-12.9c-1.2-3.9-7.3-3-7.3-3s.2 7.8 5.9 6.6C9.5 9.8 8 9 8 9c2.8 0 3 3.4 3 3.4V17h2v-4.2s0-3.9 3-4.9c0 0-2 3-2 5c7 .7 7-8.9 7-8.9s-8.9-1-9.7 5.1" },
            { nome: 'ideia',       d: "M12 6a6 6 0 0 1 6 6c0 2.22-1.21 4.16-3 5.2V19a1 1 0 0 1-1 1h-4a1 1 0 0 1-1-1v-1.8c-1.79-1.04-3-2.98-3-5.2a6 6 0 0 1 6-6m2 15v1a1 1 0 0 1-1 1h-2a1 1 0 0 1-1-1v-1zm6-10h3v2h-3zM1 11h3v2H1zM13 1v3h-2V1zM4.92 3.5l2.13 2.14l-1.42 1.41L3.5 4.93zm12.03 2.13l2.12-2.13l1.43 1.43l-2.13 2.12z" },
            { nome: 'visão',       d: "M12 9a3 3 0 0 0-3 3a3 3 0 0 0 3 3a3 3 0 0 0 3-3a3 3 0 0 0-3-3m0 8a5 5 0 0 1-5-5a5 5 0 0 1 5-5a5 5 0 0 1 5 5a5 5 0 0 1-5 5m0-12.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5" },
            { nome: 'pensamento',  d: "M21.33 12.91c.09 1.55-.62 3.04-1.89 3.95l.77 1.49c.23.45.26.98.06 1.45c-.19.47-.58.84-1.06 1l-.79.25a1.69 1.69 0 0 1-1.86-.55L14.44 18c-.89-.15-1.73-.53-2.44-1.1c-.5.15-1 .23-1.5.23c-.88 0-1.76-.27-2.5-.79c-.53.16-1.07.23-1.62.22c-.79.01-1.57-.15-2.3-.45a4.1 4.1 0 0 1-2.43-3.61c-.08-.72.04-1.45.35-2.11c-.29-.75-.32-1.57-.07-2.33C2.3 7.11 3 6.32 3.87 5.82c.58-1.69 2.21-2.82 4-2.7c1.6-1.5 4.05-1.66 5.83-.37c.42-.11.86-.17 1.3-.17c1.36-.03 2.65.57 3.5 1.64c2.04.53 3.5 2.35 3.58 4.47c.05 1.11-.25 2.2-.86 3.13c.07.36.11.72.11 1.09m-5-1.41c.57.07 1.02.5 1.02 1.07a1 1 0 0 1-1 1h-.63c-.32.9-.88 1.69-1.62 2.29c.25.09.51.14.77.21c5.13-.07 4.53-3.2 4.53-3.25a2.59 2.59 0 0 0-2.69-2.49a1 1 0 0 1-1-1a1 1 0 0 1 1-1c1.23.03 2.41.49 3.33 1.3c.05-.29.08-.59.08-.89c-.06-1.24-.62-2.32-2.87-2.53c-1.25-2.96-4.4-1.32-4.4-.4c-.03.23.21.72.25.75a1 1 0 0 1 1 1c0 .55-.45 1-1 1c-.53-.02-1.03-.22-1.43-.56c-.48.31-1.03.5-1.6.56c-.57.05-1.04-.35-1.07-.9a.97.97 0 0 1 .88-1.1c.16-.02.94-.14.94-.77c0-.66.25-1.29.68-1.79c-.92-.25-1.91.08-2.91 1.29C6.75 5 6 5.25 5.45 7.2C4.5 7.67 4 8 3.78 9c1.08-.22 2.19-.13 3.22.25c.5.19.78.75.59 1.29c-.19.52-.77.78-1.29.59c-.73-.32-1.55-.34-2.3-.06c-.32.27-.32.83-.32 1.27c0 .74.37 1.43 1 1.83c.53.27 1.12.41 1.71.4q-.225-.39-.39-.81a1.038 1.038 0 0 1 1.96-.68c.4 1.14 1.42 1.92 2.62 2.05c1.37-.07 2.59-.88 3.19-2.13c.23-1.38 1.34-1.5 2.56-1.5m2 7.47l-.62-1.3l-.71.16l1 1.25zm-4.65-8.61a1 1 0 0 0-.91-1.03c-.71-.04-1.4.2-1.93.67c-.57.58-.87 1.38-.84 2.19a1 1 0 0 0 1 1c.57 0 1-.45 1-1c0-.27.07-.54.23-.76c.12-.1.27-.15.43-.15c.55.03 1.02-.38 1.02-.92" },
            { nome: 'esboço',      d: "M20.71 7.04c.39-.39.39-1.04 0-1.41l-2.34-2.34c-.37-.39-1.02-.39-1.41 0l-1.84 1.83l3.75 3.75M3 17.25V21h3.75L17.81 9.93l-3.75-3.75z" },
            { nome: 'imagem',      d: "m8.5 13.5l2.5 3l3.5-4.5l4.5 6H5m16 1V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2" },
            { nome: 'movimento',   d: "M10 16.5v-9l6 4.5M12 2A10 10 0 0 0 2 12a10 10 0 0 0 10 10a10 10 0 0 0 10-10A10 10 0 0 0 12 2" },
            { nome: 'emoção',      d: "m12 21.35l-1.45-1.32C5.4 15.36 2 12.27 2 8.5C2 5.41 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.08C13.09 3.81 14.76 3 16.5 3C19.58 3 22 5.41 22 8.5c0 3.77-3.4 6.86-8.55 11.53z" },
            { nome: 'brilho',      d: "M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.62L12 2L9.19 8.62L2 9.24l5.45 4.73L5.82 21z" },
            { nome: 'lançamento',  d: "m20 22l-3.86-1.55c.7-1.53 1.2-3.11 1.51-4.72zM7.86 20.45L4 22l2.35-6.27c.31 1.61.81 3.19 1.51 4.72M12 2s5 2 5 10c0 3.1-.75 5.75-1.67 7.83A2 2 0 0 1 13.5 21h-3a2 2 0 0 1-1.83-1.17C7.76 17.75 7 15.1 7 12c0-8 5-10 5-10m0 10c1.1 0 2-.9 2-2s-.9-2-2-2s-2 .9-2 2s.9 2 2 2" }
        ];

        function animateMorph() {
            const svg = document.getElementById('morph-svg');
            const rotulo = document.getElementById('rotulo');
            if (window.__morphTl) window.__morphTl.kill();
            const H = 340, s = (H / 24).toFixed(2);
            svg.innerHTML = `<defs>
                <filter id="morph-glow" x="-80%" y="-80%" width="260%" height="260%">
                    <feGaussianBlur stdDeviation="0.7" result="b"/>
                    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
                <g transform="translate(640 350) scale(${s}) translate(-12 -12)"><g id="morph-breathe">
                    <path id="morph-forma" d="${HISTORIA[0].d}" fill="#FF904D" filter="url(#morph-glow)"/>
                </g></g>`;
            const forma = document.getElementById('morph-forma');
            if (REDUCE) { forma.setAttribute('d', HISTORIA[HISTORIA.length - 1].d); rotulo.textContent = HISTORIA[HISTORIA.length - 1].nome; return; }

            const tl = gsap.timeline({ repeat: -1, defaults: { ease: 'power2.inOut' } });
            // encadeia os 10 e fecha o ciclo voltando ao primeiro
            for (let i = 1; i <= HISTORIA.length; i++) {
                const alvo = HISTORIA[i % HISTORIA.length];
                tl.to('#morph-forma', { duration: 1.0, morphSVG: alvo.d, onStart: () => rotulo.textContent = alvo.nome }, '+=0.55');
            }
            tl.timeScale(SPEED);
            window.__morphTl = tl;

            // respiração sutil mantém vivo durante as pausas (Regra Zero)
            gsap.to('#morph-breathe', { scale: 1.05, transformOrigin: 'center', duration: 2.2, ease: 'sine.inOut', repeat: -1, yoyo: true });
        }
        addEventListener('DOMContentLoaded', animateMorph);
    </script>
</body>

</html>
