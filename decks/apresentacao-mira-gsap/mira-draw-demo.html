<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mira-draw — demo do mira-draw</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; box-sizing: border-box; }
        body {
            background: #111214; color: #fff; font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 40px;
        }
        .wrap { max-width: 720px; }
        h1 { font-size: clamp(32px, 6vw, 64px); font-weight: 900; letter-spacing: -1px; }
        h1 b { color: #FF904D; }
        p { margin-top: 18px; color: rgba(255,255,255,.6); font-size: 18px; line-height: 1.6; }
        kbd {
            display: inline-block; padding: 2px 10px; border-radius: 8px; font-weight: 700;
            background: rgba(255,144,77,.15); border: 1px solid rgba(255,144,77,.4); color: #FF904D;
        }
        .field {
            margin-top: 40px; height: 220px; border-radius: 20px;
            background: radial-gradient(circle at 50% 40%, rgba(255,144,77,.12), transparent 60%),
                        repeating-linear-gradient(90deg, rgba(255,255,255,.04) 0 1px, transparent 1px 60px);
            border: 1px solid rgba(255,255,255,.1); display: flex; align-items: center;
            justify-content: space-around;
        }
        .dot { width: 40px; height: 40px; border-radius: 50%; box-shadow: 0 6px 20px rgba(0,0,0,.4); }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>Aperte <b>P</b> e desenhe</h1>
        <p>
            Isto é uma tela qualquer. Pressione <kbd>P</kbd> para abrir o mira-draw
            e rabiscar por cima — caneta, marca-texto, seta, formas, texto e borracha.<br>
            <kbd>Ctrl+Z</kbd> desfaz · <kbd>Esc</kbd> sai. Experimente arrastar setas
            entre os "jogadores" abaixo.
        </p>
        <div class="field">
            <div class="dot" style="background:#4d9fff"></div>
            <div class="dot" style="background:#4d9fff"></div>
            <div class="dot" style="background:#ff5a5a"></div>
            <div class="dot" style="background:#ff5a5a"></div>
            <div class="dot" style="background:#ffd24d"></div>
        </div>
    </div>

    <script src="mira-draw.js" defer></script>
</body>
</html>
