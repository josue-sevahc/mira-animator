<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A alma da ideia — MIRA · GSAP (prova de história)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="assets/gsap/gsap.min.js"></script>
    <script src="assets/gsap/MorphSVGPlugin.min.js"></script>
    <script src="assets/gsap/DrawSVGPlugin.min.js"></script>
    <script src="assets/gsap/MotionPathPlugin.min.js"></script>
    <style>
        html, body { overflow-x: hidden; }
        body { background: #0a0a0a; min-height: 100vh; color: #fff; font-family: 'Inter', sans-serif; }
        .glass-card {
            background: rgba(255,255,255,.05); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,.1); box-shadow: 0 10px 30px rgba(255,144,77,.15);
        }
        .primary-color { color: #FF904D; }
        .anim-stage { width: 100%; height: clamp(420px, 64vh, 640px); }
        .anim-stage svg { width: 100%; height: 100%; display: block; }
        @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
    </style>
</head>

<body class="font-sans">
    <main class="min-h-screen flex items-center justify-center px-6 py-10">
        <div class="w-full max-w-6xl">
            <div class="text-center mb-3">
                <h2 class="text-4xl md:text-5xl font-bold mb-2">Metáforas são <span class="primary-color italic">poderosas</span></h2>
                <p class="text-white/60 italic text-lg md:text-xl">A lâmpada acende, sua alma é guardada, a essência preservada.</p>
            </div>
            <div class="glass-card rounded-2xl p-2 md:p-3">
                <!-- @MIRA:SIZE 5/10 -->
                <div class="anim-stage" id="alma-stage">
                    <svg id="alma-svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid meet"></svg>
                </div>
            </div>
            <p class="text-center text-white/30 text-xs mt-4">Prova de história em GSAP, DrawSVG + MotionPath + timeline. Loop perpétuo.</p>
        </div>
    </main>

    <script>
        gsap.registerPlugin(MorphSVGPlugin, DrawSVGPlugin, MotionPathPlugin);
        const ACCENT = '#FF904D', SVGNS = 'http://www.w3.org/2000/svg';
        const REDUCE = matchMedia('(prefers-reduced-motion: reduce)').matches;
        const MIRA_SIZE = 5, SPEED = 0.7 + MIRA_SIZE * 0.05;

        const BX = 380, BY = 300;     // lâmpada (a ideia)
        const GX = 905, GY = 360;     // joia (a essência)
        const SOULS = ['#22D3EE', '#FF8A3D', '#EF4444', '#22C55E', '#FFD23F']; // ciano, laranja, vermelho, verde, amarelo
        const FLAME = 'M0,-22 C11,-9 11,9 0,20 C-11,9 -11,-9 0,-22 Z';
        const GEM = `M${GX - 60},${GY - 40} L${GX},${GY - 78} L${GX + 60},${GY - 40} L${GX},${GY + 96} Z`;
        const ARC = `M${BX},${BY - 6} C${BX + 130},${BY - 180} ${GX - 150},${GY - 200} ${GX},${GY}`;

        function glow(id, dev) {
            return `<filter id="${id}" x="-120%" y="-120%" width="340%" height="340%">
                <feGaussianBlur stdDeviation="${dev}" result="b"/>
                <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>`;
        }
        function ring(svg, x, y, c, r) {
            const e = document.createElementNS(SVGNS, 'circle');
            e.setAttribute('cx', x); e.setAttribute('cy', y); e.setAttribute('r', 30);
            e.setAttribute('fill', 'none'); e.setAttribute('stroke', c); e.setAttribute('stroke-width', 3);
            svg.appendChild(e);
            gsap.to(e, { attr: { r: r, 'stroke-width': 1 }, opacity: 0, duration: 1.1, ease: 'power2.out', onComplete: () => e.remove() });
        }

        function build() {
            const svg = document.getElementById('alma-svg');
            // raios em volta da lâmpada
            let rays = '';
            for (let i = 0; i < 12; i++) {
                const a = (Math.PI / 2 + 0.7) + i / 11 * (Math.PI * 2 - 1.4);
                const x1 = (BX + Math.cos(a) * 104).toFixed(1), y1 = ((BY - 10) + Math.sin(a) * 104).toFixed(1);
                const x2 = (BX + Math.cos(a) * 138).toFixed(1), y2 = ((BY - 10) + Math.sin(a) * 138).toFixed(1);
                rays += `<line class="alma-ray" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#FFD23F" stroke-width="3" stroke-linecap="round" opacity="0.45"/>`;
            }
            svg.innerHTML = `<defs>${glow('al-glow', 7)}${glow('al-soft', 16)}</defs>
                <!-- caminho da alma (oculto) -->
                <path id="al-arc" d="${ARC}" fill="none" stroke="none"/>

                <!-- LÂMPADA, a ideia -->
                <circle cx="${BX}" cy="${BY - 10}" r="120" fill="#FFD23F" opacity="0.10" filter="url(#al-soft)"/>
                <g filter="url(#al-glow)">
                    ${rays}
                    <circle cx="${BX}" cy="${BY - 10}" r="92" fill="rgba(255,210,63,0.12)" stroke="rgba(255,226,140,0.6)" stroke-width="3"/>
                    <path id="al-fila" d="M${BX - 34},${BY + 6} C${BX - 24},${BY - 44} ${BX + 24},${BY - 44} ${BX + 34},${BY + 6}" fill="none" stroke="#FFD23F" stroke-width="4.5" stroke-linecap="round"/>
                    <line x1="${BX - 34}" y1="${BY + 6}" x2="${BX - 20}" y2="${BY + 44}" stroke="#FFD23F" stroke-width="3.5" stroke-linecap="round"/>
                    <line x1="${BX + 34}" y1="${BY + 6}" x2="${BX + 20}" y2="${BY + 44}" stroke="#FFD23F" stroke-width="3.5" stroke-linecap="round"/>
                </g>
                <!-- rosca/base -->
                <path d="M${BX - 44},${BY + 78} L${BX + 44},${BY + 78} L${BX + 32},${BY + 104} L${BX - 32},${BY + 104} Z" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.22)" stroke-width="2"/>
                <path d="M${BX - 32},${BY + 104} L${BX + 32},${BY + 104} L${BX + 25},${BY + 150} L${BX - 25},${BY + 150} Z" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.24)" stroke-width="2"/>
                <text x="${BX}" y="${BY + 196}" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-size="20" font-weight="600">a ideia</text>

                <!-- JOIA, a essência viva -->
                <g id="al-gem">
                    <path id="al-gemfill" d="${GEM}" fill="rgba(255,210,63,0.20)"/>
                    <path d="${GEM}" fill="none" stroke="#fff" stroke-width="2.5" filter="url(#al-glow)"/>
                    <line x1="${GX - 60}" y1="${GY - 40}" x2="${GX + 60}" y2="${GY - 40}" stroke="#fff" stroke-opacity="0.5" stroke-width="1.5"/>
                    <line x1="${GX}" y1="${GY - 78}" x2="${GX}" y2="${GY + 96}" stroke="#fff" stroke-opacity="0.35" stroke-width="1.5"/>
                    <line x1="${GX - 60}" y1="${GY - 40}" x2="${GX}" y2="${GY + 96}" stroke="#fff" stroke-opacity="0.25" stroke-width="1.5"/>
                    <line x1="${GX + 60}" y1="${GY - 40}" x2="${GX}" y2="${GY + 96}" stroke="#fff" stroke-opacity="0.25" stroke-width="1.5"/>
                    <circle id="al-core" cx="${GX}" cy="${GY}" r="12" fill="#fff" filter="url(#al-glow)"/>
                </g>
                <text x="${GX}" y="${GY + 150}" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">essência viva</text>

                <!-- ALMA (chama que viaja) -->
                <g id="al-soul" opacity="0"><path d="${FLAME}" fill="${SOULS[0]}" filter="url(#al-soft)"/><circle cy="-4" r="4.5" fill="#fff"/></g>`;

            if (REDUCE) { gsap.set('#al-soul', { opacity: 0 }); gsap.set('#al-gemfill', { fill: SOULS[1] }); return; }

            // perpétuo: raios cintilam, núcleo da joia pulsa
            gsap.to('.alma-ray', { opacity: 1, duration: 1, ease: 'sine.inOut', repeat: -1, yoyo: true, stagger: { each: 0.12, from: 'random' } });
            gsap.to('#al-core', { attr: { r: 17 }, duration: 0.9, ease: 'sine.inOut', repeat: -1, yoyo: true });

            // entrada: o filamento se desenha (a ideia acende)
            gsap.from('#al-fila', { drawSVG: '50% 50%', duration: 1.2, ease: 'power1.inOut' });

            // história em loop: a alma nasce, viaja e é guardada na joia
            let i = 0, color = SOULS[0];
            const tl = gsap.timeline({ repeat: -1, repeatDelay: 0.6, delay: 1.0 });
            tl.call(() => { color = SOULS[i % SOULS.length]; i++; gsap.set('#al-soul path', { fill: color }); })
              .set('#al-soul', { motionPath: { path: '#al-arc', start: 0, end: 0, align: '#al-arc', alignOrigin: [0.5, 0.5] }, scale: 0.4, opacity: 0, transformOrigin: 'center' })
              .to('#al-soul', { opacity: 1, scale: 1, transformOrigin: 'center', duration: 0.45, ease: 'back.out(2)' })
              .to('#al-soul', { motionPath: { path: '#al-arc', align: '#al-arc', alignOrigin: [0.5, 0.5] }, duration: 1.5, ease: 'power1.inOut' })
              .to('#al-soul', { scale: 0.15, opacity: 0, transformOrigin: 'center', duration: 0.35, ease: 'power2.in' })
              .add(() => { gsap.to('#al-gemfill', { fill: color, duration: 0.5 }); ring(svg, GX, GY, color, 150); }, '<')
              .fromTo('#al-gem', { scale: 1 }, { scale: 1.15, transformOrigin: GX + 'px ' + GY + 'px', duration: 0.18, ease: 'sine.inOut', yoyo: true, repeat: 1 });
            tl.timeScale(SPEED);
        }
        addEventListener('DOMContentLoaded', build);
    </script>
</body>

</html>
