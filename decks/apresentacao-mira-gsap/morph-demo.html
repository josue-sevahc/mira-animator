<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo: dois SVGs morfando — MIRA · GSAP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="assets/gsap/gsap.min.js"></script>
    <script src="assets/gsap/MorphSVGPlugin.min.js"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .primary-color { color: #FF904D; }
        .glass-card { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); }
        svg { width: 100%; height: clamp(380px, 60vh, 560px); display: block; }
        @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
    </style>
</head>

<body class="flex items-center justify-center px-6 py-10">
    <div class="w-full max-w-4xl text-center">
        <h2 class="text-3xl md:text-4xl font-bold mb-1">Dois SVGs, <span class="primary-color italic">um morfa no outro</span></h2>
        <p class="text-white/55 italic mb-1">Entrada: <code class="primary-color">cloud.svg</code> e <code class="primary-color">heart.svg</code> (paths únicos, mesmo viewBox).</p>
        <p id="rotulo" class="text-white/40 text-sm mb-3">nuvem</p>
        <div class="glass-card rounded-2xl p-2">
            <svg id="demo" viewBox="0 0 1280 600" preserveAspectRatio="xMidYMid meet"></svg>
        </div>
        <p class="text-white/30 text-xs mt-4">É isto que <code>/mira-svg-morph cloud.svg heart.svg</code> geraria. Troque os dois arquivos e a forma muda.</p>
    </div>

    <script>
        gsap.registerPlugin(MorphSVGPlugin);
        const ACCENT = '#FF904D';

        // os dois SVGs de entrada (na prática, a skill lê isto dos arquivos e cola inline)
        const SVG_A = { nome: 'nuvem',   d: "M6.5 20q-2.28 0-3.89-1.57Q1 16.85 1 14.58q0-1.95 1.17-3.48q1.18-1.53 3.08-1.95q.63-2.3 2.5-3.72Q9.63 4 12 4q2.93 0 4.96 2.04Q19 8.07 19 11q1.73.2 2.86 1.5q1.14 1.28 1.14 3q0 1.88-1.31 3.19T18.5 20Z" };
        const SVG_B = { nome: 'coração', d: "m12 21.35l-1.45-1.32C5.4 15.36 2 12.27 2 8.5C2 5.41 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.08C13.09 3.81 14.76 3 16.5 3C19.58 3 22 5.41 22 8.5c0 3.77-3.4 6.86-8.55 11.53z" };

        const svg = document.getElementById('demo');
        const rotulo = document.getElementById('rotulo');
        // escala o ícone 24x24 para o centro do palco (mesma técnica da skill)
        const H = 360, s = (H / 24).toFixed(2);
        svg.innerHTML = `<defs>
            <filter id="g" x="-80%" y="-80%" width="260%" height="260%">
                <feGaussianBlur stdDeviation="0.7" result="b"/>
                <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            </defs>
            <g transform="translate(640 300) scale(${s}) translate(-12 -12)">
                <path id="forma" d="${SVG_A.d}" fill="${ACCENT}" filter="url(#g)"/>
            </g>`;

        if (!matchMedia('(prefers-reduced-motion: reduce)').matches) {
            const tl = gsap.timeline({ repeat: -1, defaults: { ease: 'power2.inOut' } });
            tl.to('#forma', { morphSVG: SVG_B.d, duration: 1.4, onStart: () => rotulo.textContent = SVG_A.nome + ' → ' + SVG_B.nome }, '+=0.9')
              .to('#forma', { morphSVG: SVG_A.d, duration: 1.4, onStart: () => rotulo.textContent = SVG_B.nome + ' → ' + SVG_A.nome }, '+=0.9');
        }
    </script>
</body>

</html>
