<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo: borboleta batendo asas — MIRA · GSAP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="assets/gsap/gsap.min.js"></script>
    <style>
        html, body { overflow-x: hidden; }
        body { background: #0a0a0a; color: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .glass-card { background: rgba(255,255,255,.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,.1); box-shadow: 0 10px 30px rgba(255,144,77,.15); }
        .primary-color { color: #FF904D; }
        .anim-stage { width: 100%; height: clamp(420px, 62vh, 600px); }
        .anim-stage svg { width: 100%; height: 100%; display: block; }
        @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
    </style>
</head>

<body>
    <main class="min-h-screen flex items-center justify-center px-6 py-10">
        <div class="w-full max-w-6xl">
            <div class="text-center mb-2">
                <h2 class="text-4xl md:text-5xl font-bold mb-2">A borboleta <span class="primary-color italic">bate as asas</span></h2>
                <p class="text-white/60 italic text-lg md:text-xl">GSAP girando/escalando cada asa em torno do corpo, em loop.</p>
            </div>
            <div class="glass-card rounded-2xl p-2 md:p-3">
                <!-- @MIRA:SIZE 3/10 -->
                <div class="anim-stage" id="bfly-stage">
                    <svg id="bfly-svg" viewBox="0 0 800 540" preserveAspectRatio="xMidYMid meet">
                        <defs>
                            <filter id="bfly-glow" x="-30%" y="-30%" width="160%" height="160%">
                                <feGaussianBlur stdDeviation="3" result="b"/>
                                <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
                            </filter>
                        </defs>

                        <g id="bfly">
                            <!-- ASA ESQUERDA (grupo próprio, dobradiça no corpo) -->
                            <g id="lwing" fill="rgba(255,144,77,0.16)" stroke="#FF904D" stroke-width="5" filter="url(#bfly-glow)">
                                <ellipse cx="300" cy="205" rx="125" ry="82" transform="rotate(-16 300 205)"/>
                                <ellipse cx="322" cy="352" rx="95" ry="74" transform="rotate(12 322 352)"/>
                                <circle cx="270" cy="195" r="16" fill="#FF904D" stroke="none"/>
                                <circle cx="300" cy="360" r="9" fill="#FF904D" stroke="none"/>
                            </g>
                            <!-- ASA DIREITA (espelhada) -->
                            <g id="rwing" fill="rgba(255,144,77,0.16)" stroke="#FF904D" stroke-width="5" filter="url(#bfly-glow)">
                                <ellipse cx="500" cy="205" rx="125" ry="82" transform="rotate(16 500 205)"/>
                                <ellipse cx="478" cy="352" rx="95" ry="74" transform="rotate(-12 478 352)"/>
                                <circle cx="530" cy="195" r="16" fill="#FF904D" stroke="none"/>
                                <circle cx="500" cy="360" r="9" fill="#FF904D" stroke="none"/>
                            </g>
                            <!-- CORPO + cabeça + antenas (ficam firmes) -->
                            <g id="body" stroke="#FF904D" stroke-width="5" stroke-linecap="round" fill="#FF904D" filter="url(#bfly-glow)">
                                <ellipse cx="400" cy="285" rx="15" ry="98"/>
                                <circle cx="400" cy="180" r="18"/>
                                <path id="ant-l" d="M392,168 C360,120 350,96 332,86" fill="none"/>
                                <path id="ant-r" d="M408,168 C440,120 450,96 468,86" fill="none"/>
                            </g>
                        </g>
                    </svg>
                </div>
            </div>
            <p class="text-center text-white/30 text-xs mt-4">Asas separadas em grupos (#lwing / #rwing). O GSAP só faz isto porque elas NÃO são um path único.</p>
        </div>
    </main>

    <script>
        const REDUCE = matchMedia('(prefers-reduced-motion: reduce)').matches;
        const MIRA_SIZE = 3, SPEED = 0.7 + MIRA_SIZE * 0.1;

        if (!REDUCE) {
            // a dobradiça das duas asas é o eixo do corpo (x=400, y=285)
            const flap = { duration: 0.46, ease: 'sine.inOut', repeat: -1, yoyo: true, transformOrigin: '400px 285px' };
            const tl = gsap.timeline();
            tl.to('#lwing', { scaleX: 0.32, ...flap }, 0)   // asa encolhe no eixo X: lê como "levantou"
              .to('#rwing', { scaleX: 0.32, ...flap }, 0)
              // o corpo sobe e desce de leve, no mesmo compasso do bater
              .to('#bfly', { y: -14, duration: 0.46, ease: 'sine.inOut', repeat: -1, yoyo: true }, 0)
              // as antenas balançam um tiquinho
              .to('#ant-l, #ant-r', { rotation: 4, transformOrigin: '400px 168px', duration: 1.1, ease: 'sine.inOut', repeat: -1, yoyo: true }, 0);
            tl.timeScale(SPEED);
        }
    </script>
</body>

</html>
