<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo: vários SVGs em sequência — MIRA · GSAP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="assets/gsap/gsap.min.js"></script>
    <script src="assets/gsap/MorphSVGPlugin.min.js"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .primary-color { color: #FF904D; }
        .glass-card { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); }
        svg { width: 100%; height: clamp(380px, 60vh, 560px); display: block; }
        @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
    </style>
</head>

<body class="flex items-center justify-center px-6 py-10">
    <div class="w-full max-w-4xl text-center">
        <h2 class="text-3xl md:text-4xl font-bold mb-1">Vários SVGs, <span class="primary-color italic">um encadeia no outro</span></h2>
        <p class="text-white/55 italic mb-1">Sequência: nuvem → lâmpada → olho → coração → (volta)</p>
        <p id="rotulo" class="text-white/40 text-sm mb-3">nuvem</p>
        <div class="glass-card rounded-2xl p-2">
            <svg id="demo" viewBox="0 0 1280 600" preserveAspectRatio="xMidYMid meet"></svg>
        </div>
        <p class="text-white/30 text-xs mt-4">É isto que <code>/mira-svg-morph nuvem.svg lampada.svg olho.svg coracao.svg</code> geraria.</p>
    </div>

    <script>
        gsap.registerPlugin(MorphSVGPlugin);
        const ACCENT = '#FF904D';

        // a lista de SVGs de entrada, na ordem em que você passar
        const SEQ = [
            { nome: 'nuvem',   d: "M6.5 20q-2.28 0-3.89-1.57Q1 16.85 1 14.58q0-1.95 1.17-3.48q1.18-1.53 3.08-1.95q.63-2.3 2.5-3.72Q9.63 4 12 4q2.93 0 4.96 2.04Q19 8.07 19 11q1.73.2 2.86 1.5q1.14 1.28 1.14 3q0 1.88-1.31 3.19T18.5 20Z" },
            { nome: 'lâmpada', d: "M12 6a6 6 0 0 1 6 6c0 2.22-1.21 4.16-3 5.2V19a1 1 0 0 1-1 1h-4a1 1 0 0 1-1-1v-1.8c-1.79-1.04-3-2.98-3-5.2a6 6 0 0 1 6-6m2 15v1a1 1 0 0 1-1 1h-2a1 1 0 0 1-1-1v-1zm6-10h3v2h-3zM1 11h3v2H1zM13 1v3h-2V1zM4.92 3.5l2.13 2.14l-1.42 1.41L3.5 4.93zm12.03 2.13l2.12-2.13l1.43 1.43l-2.13 2.12z" },
            { nome: 'olho',    d: "M12 9a3 3 0 0 0-3 3a3 3 0 0 0 3 3a3 3 0 0 0 3-3a3 3 0 0 0-3-3m0 8a5 5 0 0 1-5-5a5 5 0 0 1 5-5a5 5 0 0 1 5 5a5 5 0 0 1-5 5m0-12.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5" },
            { nome: 'coração', d: "m12 21.35l-1.45-1.32C5.4 15.36 2 12.27 2 8.5C2 5.41 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.08C13.09 3.81 14.76 3 16.5 3C19.58 3 22 5.41 22 8.5c0 3.77-3.4 6.86-8.55 11.53z" }
        ];

        const svg = document.getElementById('demo');
        const rotulo = document.getElementById('rotulo');
        const H = 340, s = (H / 24).toFixed(2);
        svg.innerHTML = `<defs>
            <filter id="g" x="-80%" y="-80%" width="260%" height="260%">
                <feGaussianBlur stdDeviation="0.7" result="b"/>
                <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            </defs>
            <g transform="translate(640 300) scale(${s}) translate(-12 -12)">
                <path id="forma" d="${SEQ[0].d}" fill="${ACCENT}" filter="url(#g)"/>
            </g>`;

        if (!matchMedia('(prefers-reduced-motion: reduce)').matches) {
            const tl = gsap.timeline({ repeat: -1, defaults: { ease: 'power2.inOut' } });
            // encadeia: cada item da lista morfa no próximo, e o último volta ao primeiro
            for (let i = 1; i <= SEQ.length; i++) {
                const alvo = SEQ[i % SEQ.length];
                tl.to('#forma', { morphSVG: alvo.d, duration: 1.2, onStart: () => rotulo.textContent = alvo.nome }, '+=0.7');
            }
        }
    </script>
</body>

</html>
