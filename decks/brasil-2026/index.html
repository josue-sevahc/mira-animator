<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Brasil na Copa 2026</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        /* @MIRA:THEME:START */
:root {
    --mira-primary: #ffffff;
    --mira-bg: #000000;
    --mira-text: #ffffff;
    --mira-text-soft: rgba(255, 255, 255, 0.72);
    --mira-text-softer: rgba(255, 255, 255, 0.50);
    --mira-accent-2: #d7e3ff;
}

body {
    background: var(--mira-bg);
    min-height: 100vh;
    color: var(--mira-text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
        /* @MIRA:THEME:END */

        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100%; background: #000; }
        html { scroll-behavior: smooth; }
        /* Scroll discreto (padrao Mira): a navegacao e por teclado/botao e o
           progresso ja aparece na barra do topo; a scrollbar fica quase invisivel. */
        html { scrollbar-width: thin; scrollbar-color: #2e2e2e #0d0d0d; }
        ::-webkit-scrollbar { width: 6px; height: 6px; background: #0d0d0d; }
        ::-webkit-scrollbar-track { background: #0d0d0d; }
        ::-webkit-scrollbar-thumb { background: #2e2e2e; border-radius: 999px; }
        ::-webkit-scrollbar-thumb:hover { background: #4a4a4a; }
        ::-webkit-scrollbar-button { display: none; width: 0; height: 0; }
        body { color: #fff; overflow-x: hidden; }

        .slide {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }
        .stage {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        .replay-btn {
            position: absolute;
            bottom: 22px; right: 22px;
            z-index: 6;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.14);
            color: rgba(255, 255, 255, 0.7);
            border-radius: 9999px;
            padding: 6px 14px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            opacity: 0.5;
        }
        .replay-btn:hover { opacity: 1; color: #fff; }

        /* Passagem de slides: barra de progresso + botão + teclado */
        #mira-progress {
            position: fixed; top: 0; left: 0; height: 3px; width: 0%;
            background: linear-gradient(90deg, #009C3B, #FFDF00, #002776);
            background-size: 200% 100%;
            animation: mira-shimmer 3s linear infinite;
            z-index: 9999; transition: width 0.1s linear;
        }
        @keyframes mira-shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        #mira-next {
            position: fixed; bottom: 32px; left: 32px;
            width: 46px; height: 46px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.12); color: #fff;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.2);
            opacity: 0; transform: translateY(20px);
            transition: all 0.3s ease; z-index: 9998;
        }
        #mira-next.visible { opacity: 0.55; transform: translateY(0); }
        #mira-next.visible:hover { opacity: 1; transform: translateY(-3px) scale(1.08); }
        #mira-next svg { transition: transform 0.3s ease; }
        #mira-next.up svg { transform: rotate(180deg); }
    
/* @MIRA:RESPONSIVE:START */
/* ============================================================
   MIRA — responsive.css  (camada de reflow mobile-first)
   Objetivo: TODO slide 16:9 do Mira vira legível no celular em
   retrato SEM arquivo mobile separado. O mesmo deck se reorganiza:
   fontes encolhem, grids empilham, padding reduz, palcos escalam.

   Estratégia: os decks nascem "desktop-first" (classes Tailwind com
   tamanhos fixos: text-6xl, p-10, ...). Esta camada sobrescreve essas
   classes abaixo de 640px. Usa !important de propósito — precisa
   vencer o Tailwind CDN (injetado em runtime) em decks legados sem
   reescrever o HTML. Os clamps têm teto ~= valor desktop, então em
   telas largas nada muda; só encolhem no estreito.
   ============================================================ */

/* Guarda universal contra overflow horizontal (o "print cortado" no zap). */
html, body { max-width: 100%; overflow-x: hidden; }
img, svg, video, canvas, iframe, table, pre { max-width: 100%; }

@media (max-width: 640px) {

  /* --- Tipografia fluida: encolhe títulos gigantes no celular --- */
  .text-9xl { font-size: clamp(3rem, 12vw, 5rem)      !important; line-height: 1.05 !important; }
  .text-8xl { font-size: clamp(2.75rem, 11vw, 4.5rem) !important; line-height: 1.06 !important; }
  .text-7xl { font-size: clamp(2.25rem, 10vw, 3.75rem)!important; line-height: 1.08 !important; }
  .text-6xl { font-size: clamp(2rem, 9vw, 3rem)       !important; line-height: 1.1  !important; }
  .text-5xl { font-size: clamp(1.75rem, 8vw, 2.5rem)  !important; line-height: 1.12 !important; }
  .text-4xl { font-size: clamp(1.5rem, 7vw, 2rem)     !important; line-height: 1.15 !important; }
  .text-3xl { font-size: clamp(1.35rem, 6vw, 1.75rem) !important; line-height: 1.2  !important; }
  .text-2xl { font-size: clamp(1.2rem, 5vw, 1.5rem)   !important; line-height: 1.25 !important; }
  .text-xl  { font-size: clamp(1.05rem, 4.5vw, 1.25rem)!important; line-height: 1.3 !important; }

  /* Títulos: quebram entre palavras; só partem uma palavra se ela sozinha
     estourar a largura. Sem hyphens:auto — em PT ele hifena no meio
     ("pode-rosas") e fica feio em título de display. */
  h1, h2, h3 { overflow-wrap: break-word; }

  /* --- Espaçamento: paddings de desktop sufocam o celular --- */
  .p-12 { padding: 1.25rem !important; }
  .p-10 { padding: 1.15rem !important; }
  .p-8  { padding: 1.05rem !important; }
  .px-12, .px-10 { padding-left: 1.15rem !important; padding-right: 1.15rem !important; }
  .px-8 { padding-left: 1rem !important; padding-right: 1rem !important; }
  .py-16 { padding-top: 2.5rem !important; padding-bottom: 2.5rem !important; }
  .gap-8 { gap: 1rem !important; }
  .gap-10, .gap-12 { gap: 1.25rem !important; }

  /* --- Layout: seção de slide sempre alcançável pelo topo ---
     min-h-screen + justify-center clipa o topo quando o conteúdo é
     maior que a tela. No celular, ancora no topo e deixa rolar. */
  .min-h-screen {
    min-height: 100dvh !important;
    height: auto !important;
    padding-top: 2rem !important;
    padding-bottom: 2rem !important;
  }
  .min-h-screen.justify-center,
  .min-h-screen.items-center { justify-content: flex-start !important; }

  /* --- Grids/flex de 2+ colunas empilham (redundante ao md: do
         Tailwind, mas cobre grids sem breakpoint declarado). --- */
  .grid-cols-2, .grid-cols-3, .grid-cols-4 { grid-template-columns: 1fr !important; }

  /* --- Palco de animação (D3/SVG/canvas): nunca estoura a largura,
         mantém proporção e encolhe a altura. --- */
  .anim-stage {
    max-width: 100% !important;
    height: auto !important;
    aspect-ratio: 16 / 9;
    min-height: 0 !important;
  }

  /* --- Tabelas: fonte menor + rolagem horizontal se precisar. --- */
  table { font-size: 0.82rem !important; }
  .overflow-x-auto { -webkit-overflow-scrolling: touch; }

  /* --- Controles flutuantes respeitam a safe-area do iPhone. --- */
  #mira-next, #next-card {
    bottom: max(1rem, env(safe-area-inset-bottom)) !important;
    right: max(1rem, env(safe-area-inset-right)) !important;
    width: 44px !important; height: 44px !important;
  }
}
/* @MIRA:RESPONSIVE:END */
</style>
</head>

<body>
    <div id="mira-progress"></div>
    <button id="mira-next" aria-label="Próximo slide">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
    </button>

    <!-- SLIDE 1: header Brasil na Copa 2026 -->
    <section class="slide" data-anim="s1">
        <svg class="stage" id="s1-svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice"></svg>
        <button class="replay-btn" data-replay="s1">↻ replay</button>
    </section>

    <!-- SLIDE 2: escudo CBF -->
    <section class="slide" data-anim="s2">
        <svg class="stage" id="s2-svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice"></svg>
        <button class="replay-btn" data-replay="s2">↻ replay</button>
    </section>

    <!-- SLIDE 3: logo CazéTV -->
    <section class="slide" data-anim="s3">
        <svg class="stage" id="s3-svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice"></svg>
        <button class="replay-btn" data-replay="s3">↻ replay</button>
    </section>

    <script>
        // Paleta Brasil: verde, amarelo, azul + branco
        const VERDE = '#009C3B', AMARELO = '#FFDF00', AZUL = '#002776', AZUL_CLARO = '#4D8BFF', WHITE = '#ffffff';
        const PAL = [VERDE, AMARELO, AZUL_CLARO];

        // ===== Infraestrutura: gerações + timers (anti-vazamento de loop) =====
        const ANIM = {};
        const TIMERS = {};
        const GEN = {};
        function stop(key) { (TIMERS[key] || []).forEach(t => t && t.stop && t.stop()); TIMERS[key] = []; }
        function track(key, t) { (TIMERS[key] = TIMERS[key] || []).push(t); return t; }
        function play(key) {
            if (!ANIM[key]) return;
            GEN[key] = (GEN[key] || 0) + 1;
            const svg = d3.select('#' + key + '-svg');
            svg.selectAll('*').interrupt();
            svg.selectAll('*').remove();
            stop(key);
            ANIM[key](svg, GEN[key]);
        }

        // ===== SLIDE 1: header com partículas verde-amarelas e título =====
        ANIM.s1 = function (svg, gen) {
            const cx = 640, cy = 360, N = 60;
            const dots = d3.range(N).map((d, i) => {
                const ang = Math.random() * Math.PI * 2, rad = 180 + Math.random() * 420;
                return {
                    baseX: cx + Math.cos(ang) * rad, baseY: cy + Math.sin(ang) * rad * 0.6,
                    orbit: 10 + Math.random() * 50, speed: 0.0005 + Math.random() * 0.0015,
                    phase: Math.random() * Math.PI * 2, r: 1.6 + Math.random() * 3.8,
                    c: PAL[i % PAL.length]
                };
            });
            const fg = svg.append('g').selectAll('circle').data(dots).join('circle')
                .attr('r', d => d.r).attr('fill', d => d.c).attr('fill-opacity', 0)
                .style('filter', d => `drop-shadow(0 0 6px ${d.c})`);
            fg.transition().duration(1200).attr('fill-opacity', 0.75);
            track('s1', d3.timer((el) => {
                if (gen !== GEN.s1) return;
                fg.attr('cx', (d, i) => d.baseX + Math.cos(d.phase + el * d.speed) * d.orbit)
                  .attr('cy', (d, i) => d.baseY + Math.sin((d.phase + el * d.speed) * 1.3) * d.orbit * 0.7)
                  .attr('r', (d, i) => d.r * (1 + Math.sin(el * 0.002 + i) * 0.25));
            }));

            // Título
            const g = svg.append('g').attr('text-anchor', 'middle');
            g.append('text').attr('x', cx).attr('y', cy - 40)
                .attr('fill', WHITE).attr('font-size', 92).attr('font-weight', 800)
                .attr('letter-spacing', 6).attr('opacity', 0)
                .text('BRASIL')
                .transition().delay(300).duration(900).attr('opacity', 1);
            g.append('text').attr('x', cx).attr('y', cy + 46)
                .attr('fill', AMARELO).attr('font-size', 46).attr('font-weight', 600)
                .attr('letter-spacing', 14).attr('opacity', 0)
                .text('COPA DO MUNDO 2026')
                .transition().delay(800).duration(900).attr('opacity', 1);
            const line = g.append('line')
                .attr('x1', cx).attr('x2', cx).attr('y1', cy + 90).attr('y2', cy + 90)
                .attr('stroke', VERDE).attr('stroke-width', 4).attr('stroke-linecap', 'round');
            line.transition().delay(1300).duration(700).ease(d3.easeCubicOut)
                .attr('x1', cx - 220).attr('x2', cx + 220);
            g.append('text').attr('x', cx).attr('y', cy + 136)
                .attr('fill', 'rgba(255,255,255,0.6)').attr('font-size', 24)
                .attr('letter-spacing', 4).attr('opacity', 0)
                .text('EUA · CANADÁ · MÉXICO')
                .transition().delay(1700).duration(800).attr('opacity', 1);
        };

        // ===== SLIDE 2: logo oficial da CBF (cbf.svg, Wikimedia Commons) =====
        ANIM.s2 = function (svg, gen) {
            const cx = 640, cy = 330;
            // Logo 2020: 542.67 x 896 -> altura 480 mantém a proporção
            const h = 480, w = h * (542.67 / 896);
            // Halo suave atrás da logo
            const halo = svg.append('circle').attr('cx', cx).attr('cy', cy).attr('r', 0)
                .attr('fill', 'rgba(255,223,0,0.07)');
            halo.transition().duration(1000).attr('r', 300);
            const g = svg.append('g')
                .attr('transform', `translate(${cx},${cy}) scale(0.6)`)
                .attr('opacity', 0);
            g.append('image')
                .attr('href', 'assets/cbf.svg')
                .attr('x', -w / 2).attr('y', -h / 2)
                .attr('width', w).attr('height', h);
            g.transition().duration(900).ease(d3.easeBackOut)
                .attr('transform', `translate(${cx},${cy}) scale(1)`)
                .attr('opacity', 1);

            // Legenda
            svg.append('text').attr('x', cx).attr('y', cy + h / 2 + 70)
                .attr('text-anchor', 'middle').attr('fill', 'rgba(255,255,255,0.65)')
                .attr('font-size', 26).attr('letter-spacing', 3).attr('opacity', 0)
                .text('CONFEDERAÇÃO BRASILEIRA DE FUTEBOL')
                .transition().delay(1000).duration(800).attr('opacity', 1);

            // Respiro perpétuo do halo (loop interno)
            track('s2', d3.timer((el) => {
                if (gen !== GEN.s2) return;
                halo.attr('r', 300 + Math.sin(el * 0.0012) * 18)
                    .attr('fill-opacity', 0.6 + Math.sin(el * 0.0012) * 0.4);
            }));
        };

        // ===== SLIDE 3: logo oficial da CazéTV (cazetv.png, Wikipédia) =====
        // A logo tem texto preto: precisa de cartão branco atrás (deck é dark).
        ANIM.s3 = function (svg, gen) {
            const cx = 640, cy = 330;
            // Logo: 309 x 167 -> largura 520 mantém a proporção
            const w = 520, h = w * (167 / 309), pad = 56;
            const g = svg.append('g')
                .attr('transform', `translate(${cx},${cy}) scale(0.6)`)
                .attr('opacity', 0);
            const card = g.append('rect')
                .attr('x', -w / 2 - pad).attr('y', -h / 2 - pad)
                .attr('width', w + pad * 2).attr('height', h + pad * 2)
                .attr('rx', 36).attr('fill', '#ffffff');
            g.append('image')
                .attr('href', 'assets/cazetv.png')
                .attr('x', -w / 2).attr('y', -h / 2)
                .attr('width', w).attr('height', h);
            g.transition().duration(900).ease(d3.easeBackOut)
                .attr('transform', `translate(${cx},${cy}) scale(1)`)
                .attr('opacity', 1);

            // Legenda
            svg.append('text').attr('x', cx).attr('y', cy + h / 2 + pad + 80)
                .attr('text-anchor', 'middle').attr('fill', 'rgba(255,255,255,0.65)')
                .attr('font-size', 26).attr('letter-spacing', 3).attr('opacity', 0)
                .text('TRANSMISSÃO · CAZÉTV')
                .transition().delay(1000).duration(800).attr('opacity', 1);

            // Brilho perpétuo do cartão (loop interno)
            track('s3', d3.timer((el) => {
                if (gen !== GEN.s3) return;
                const glow = 18 + Math.sin(el * 0.0015) * 10;
                card.style('filter', `drop-shadow(0 0 ${glow}px rgba(255,255,255,0.35))`);
            }));
        };

        // ===== Disparo por viewport + Replay =====
        Object.keys(ANIM).forEach(k => GEN[k] = 0);
        const io = new IntersectionObserver((entries) => {
            entries.forEach(e => {
                const k = e.target.getAttribute('data-anim');
                if (e.isIntersecting && k) play(k);
            });
        }, { threshold: 0.4 });
        document.querySelectorAll('section[data-anim]').forEach(s => io.observe(s));
        document.querySelectorAll('[data-replay]').forEach(b => b.addEventListener('click', () => play(b.getAttribute('data-replay'))));

        // ===== Navegação seção a seção (progresso + botão + teclado) =====
        (function () {
            const sections = Array.from(document.querySelectorAll('body > section'));
            if (!sections.length) return;
            const progress = document.getElementById('mira-progress');
            const nextBtn = document.getElementById('mira-next');
            const atBottom = () => (window.scrollY + window.innerHeight) >= (document.documentElement.scrollHeight - 100);
            function currentIndex() {
                const y = window.scrollY + window.innerHeight * 0.4;
                let idx = 0;
                for (let i = 0; i < sections.length; i++) if (sections[i].offsetTop <= y) idx = i;
                return idx;
            }
            function goTo(i) {
                const idx = Math.max(0, Math.min(sections.length - 1, i));
                sections[idx].scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
            window.addEventListener('scroll', () => {
                const docH = document.documentElement.scrollHeight - window.innerHeight;
                progress.style.width = (docH > 0 ? (window.scrollY / docH) * 100 : 0) + '%';
                nextBtn.classList.toggle('visible', window.scrollY > 200);
                nextBtn.classList.toggle('up', atBottom());
            });
            nextBtn.addEventListener('click', () => {
                if (atBottom()) { window.scrollTo({ top: 0, behavior: 'smooth' }); return; }
                goTo(currentIndex() + 1);
            });
            document.addEventListener('keydown', (e) => {
                if (['ArrowRight', 'ArrowDown', 'PageDown', ' '].includes(e.key)) { e.preventDefault(); goTo(currentIndex() + 1); }
                else if (['ArrowLeft', 'ArrowUp', 'PageUp'].includes(e.key)) { e.preventDefault(); goTo(currentIndex() - 1); }
                else if (e.key === 'Home') { e.preventDefault(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
                else if (e.key === 'End') { e.preventDefault(); goTo(sections.length - 1); }
                else if (e.key.toLowerCase() === 'f') { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
            });
        })();
    </script>

    <!-- mira-draw (desenhar sobre o slide): tecla P ou ?draw=1 -->
    <script src="mira/mira-draw.js" defer></script>
</body>

</html>
